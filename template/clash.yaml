    interval: 300
    tolerance: 50
    include-all: true
    filter: (港|HK|hk|Hong Kong|HongKong|hongkong)
    proxies:
  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: (日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)
    proxies:
  - name: 🇺🇲 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    include-all: true
    filter: (美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
