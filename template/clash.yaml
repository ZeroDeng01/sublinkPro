    type: select
    include-all: true
    filter: (网易|音乐|解锁|Music|NetEase)
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
  - name: 🎯 全球直连
    type: select
    proxies:
